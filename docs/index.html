<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Hamish Sullivan - Economist"
    />
    <title>Hamish Sullivan</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles.css?v=20260329-1" />
    <script src="app.js?v=20260329-1" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <div class="site-panel">
        <header class="masthead">
          <div class="masthead__copy">
            <h1>Hamish Sullivan</h1>
            <p class="masthead__subtitle">Economist</p>
          </div>
        </header>

        <main class="layout">
          <aside class="media-panel">
            <figure id="portrait-frame" class="portrait-frame portrait-frame--home">
              <img
                id="portrait-image"
                class="portrait-image"
                src="assets/home-photo.jpg?v=20260329-1"
                alt="Portrait of Hamish Sullivan"
              />
            </figure>
          </aside>

          <section
            id="content-panel"
            class="content-panel"
            role="tabpanel"
            aria-live="polite"
          ></section>
        </main>

        <nav class="speedometer-nav" aria-label="Primary navigation">
          <div class="speedometer-nav__dial">
            <div id="nav-track" class="speedometer-nav__track" role="tablist">
              <div class="speedometer-nav__indicator" aria-hidden="true"></div>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
